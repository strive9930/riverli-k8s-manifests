apiVersion: apps/v1
kind: Deployment
metadata:
  name: riverli-web
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: riverli-web
  template:
    metadata:
      labels:
        app: riverli-web
    spec:
      containers:
        - name: blog-web
          image: ghcr.io/strive9930/riverli-blog-web:v7
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
  namespace: default
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30081 # 🌟 虚拟机外网暴露端口，此后直接访问 http://虚拟机IP:30081
  selector:
    app: riverli-web