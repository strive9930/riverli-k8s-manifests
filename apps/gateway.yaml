# =============================================================================
# K8s 编排文件 — riverli-blog-gateway (API 网关)
# =============================================================================
# 说明：API 网关是整个微服务集群的入口，需要对外暴露端口。
#       ArgoCD / Jenkins 会自动将 :latest 替换为具体版本号（如 :v42）
# =============================================================================

# ─── Deployment：定义 Pod 副本集 ───
apiVersion: apps/v1
kind: Deployment
metadata:
  name: riverli-gateway          # Deployment 名称
  namespace: default             # 命名空间
spec:
  replicas: 1                    # Pod 副本数（生产环境建议 >= 2）
  selector:
    matchLabels:
      app: riverli-gateway       # 标签选择器，关联下面的 Pod 模板
  template:
    metadata:
      labels:
        app: riverli-gateway
    spec:
      # 🔐 从 GitHub Container Registry 拉取镜像所需的认证凭据
      # 创建方式：kubectl create secret docker-registry ghcr-secret \
      #   --docker-server=ghcr.io --docker-username=YOUR_USER --docker-password=YOUR_TOKEN -n default
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: blog-gateway     # 容器名称
          # 🌟 Jenkins 会自动将 latest 替换为 v${BUILD_NUMBER}
          image: ghcr.io/strive9930/riverli-blog-gateway:v9
          ports:
            - containerPort: 8080   # 容器内 ASP.NET 监听端口
          env:
             # 🌟 核心开关：告诉 .NET 容器现在是生产环境，自动加载 appsettings.Production.json
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: ConsulConfig__Address
              value: "http://consul-server:8500"   # Consul 服务发现地址

---
# ─── Service：为 Pod 创建稳定的网络入口 ───
apiVersion: v1
kind: Service
metadata:
  name: gateway-service         # Service 名称（集群内其他服务通过此名称访问）
  namespace: default
spec:
  type: NodePort                # 🌟 NodePort 类型：将端口映射到宿主机，允许外部访问
  ports:
    - port: 80                  # Service 端口（集群内访问用）
      targetPort: 8080          # 目标 Pod 端口（转发到容器的 8080）
      nodePort: 30089           # 宿主机端口（外部通过 http://<节点IP>:30080 访问）
  selector:
    app: riverli-gateway        # 关联到上面的 Deployment
